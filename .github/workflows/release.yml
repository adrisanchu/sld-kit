name: Release

# Publishes @sld-kit/core and @sld-kit/svelte to npm whenever main is pushed
# with a version that is not yet on the registry. Bump the package's
# package.json "version", commit, push main → that package is published.
# Pushes that do not change a version are validated but publish nothing (each
# publish step checks the registry first, so it is idempotent).

on:
  push:
    branches: [main]

permissions:
  contents: read
  # Required for npm provenance (OIDC). The repo must be public.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the whole workspace before validation (core → svelte, in
      # dependency order). Both packages' dist/ are gitignored, and their
      # types resolve from dist — @sld-kit/svelte resolves @sld-kit/core, and
      # examples/svelte resolves @sld-kit/svelte — so typecheck needs both
      # built beforehand. Mirrors ci.yml. The svelte package is rebuilt later,
      # right before its own publish step.
      - run: pnpm run build

      # Never publish a broken build.
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      # Build + publint + attw — guards the artifact before publish.
      - run: pnpm --filter @sld-kit/core run verify:pack

      - name: Publish @sld-kit/core if the version is new
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — nothing to do."
          else
            echo "Publishing $NAME@$VERSION…"
            # provenance comes from publishConfig.provenance + id-token: write.
            npm publish --access public
          fi

      # Build the Svelte components (svelte-package → dist) before publishing.
      - run: pnpm --filter @sld-kit/svelte run build

      - name: Publish @sld-kit/svelte if the version is new
        working-directory: packages/svelte
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — nothing to do."
          else
            echo "Publishing $NAME@$VERSION…"
            # pnpm publish (not npm) rewrites the workspace: protocol in
            # devDependencies; provenance comes from publishConfig.provenance
            # + id-token: write.
            pnpm publish --access public --no-git-checks
          fi
