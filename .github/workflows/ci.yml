name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: @sld-kit/svelte's typecheck resolves @sld-kit/core's types
      # from packages/core/dist (gitignored), so core must be built beforehand.
      # Runs in workspace dependency order (core → svelte).
      - run: pnpm run build

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

      # publint + attw (guards the publishable artifact; rebuilds core).
      - run: pnpm --filter @sld-kit/core run verify:pack
