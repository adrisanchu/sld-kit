name: Deploy example to GitHub Pages

# Builds examples/svelte as a static SPA and publishes it to GitHub Pages on
# every push to main. The site serves from the repo sub-path
# (https://adrisanchu.github.io/sld-kit/), so the example is built with
# BASE_PATH=/sld-kit — otherwise the _app/ asset URLs 404.
#
# One-time setup: Settings → Pages → Build and deployment → Source = "GitHub
# Actions". Without it the deploy job fails.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-progress deploy finish rather than
# cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the packages first (core → svelte, in dependency order). Their
      # dist/ is gitignored and the example resolves them from there, so it
      # can't build until they exist. Mirrors ci.yml.
      - run: pnpm run build

      # Build the SPA under the repo sub-path so asset URLs resolve on Pages.
      - name: Build example
        run: pnpm run build:example
        env:
          BASE_PATH: /sld-kit

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/svelte/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
